<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Look</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
 
  <nav class="navbar">
    <a class="navbar__brand" href="index.html">👗 Blog de Moda</a>
    <ul class="navbar__links">
      <li><a href="index.html">Looks</a></li>
      <li><a href="form.html">+ Novo Look</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </nav>
 
  <div class="page">
    <div class="form-card">
      <h1 id="form-titulo">Novo Look</h1>
 
      <div id="msg" class="msg"></div>
 
      <form id="formLook" novalidate>
 
        <div class="form-group">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" placeholder="Ex: Look Casual de Verão" required />
        </div>
 
        <div class="form-group">
          <label for="categoria">Categoria *</label>
          <select id="categoria" required>
            <option value="">Selecione…</option>
          </select>
        </div>
 
        <div class="form-group">
          <label for="preco">Preço (R$) *</label>
          <input type="number" id="preco" min="0" step="0.01" placeholder="0.00" required />
        </div>
 
        <div class="form-group">
          <label for="descricaoCurta">Descrição curta *</label>
          <input type="text" id="descricaoCurta" placeholder="Uma frase sobre o look" required />
        </div>
 
        <div class="form-group">
          <label for="descricaoCompleta">Descrição completa</label>
          <textarea id="descricaoCompleta" placeholder="Detalhes sobre peças, combinações…"></textarea>
        </div>
 
        <div class="form-group">
          <label for="imagem">URL da imagem</label>
          <input type="url" id="imagem" placeholder="https://…" />
          <span class="hint">Deixe em branco para usar imagem padrão.</span>
        </div>
 
        <div class="form-group">
          <label for="tags">Tags</label>
          <input type="text" id="tags" placeholder="casual, jeans, conforto" />
          <span class="hint">Separe as tags por vírgula.</span>
        </div>
 
        <div class="form-group" style="flex-direction:row;align-items:center;gap:10px;">
          <input type="checkbox" id="destaque" />
          <label for="destaque" style="font-weight:normal;">Marcar como destaque</label>
        </div>
 
        <div class="form-actions">
          <button type="submit" class="btn-primary">Salvar</button>
          <a href="index.html" class="btn-secondary">Cancelar</a>
        </div>
 
      </form>
    </div>
  </div>
 
  <script src="assets/scripts/form.js"></script>
</body>
</html>
